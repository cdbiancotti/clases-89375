{% extends "base.html" %}

{% block head_title %}
Cambiar Contraseña
{% endblock head_title %}

{% block contenido %}
<h1>Cambiar Contraseña de {{request.user.username}}</h1>

<form action="{% url "usuarios:cambiar_contrasenia" %}" method='POST'>
    {% csrf_token %}

    {{form}}

    <input type="submit" value='Guardar Cambios'>
</form>

{% endblock contenido %}
